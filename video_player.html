<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📺 Telegram TV</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0d0d16;
    --surface: #14141f;
    --card: #1c1c2e;
    --border: #2a2a42;
    --accent: #2ca5e0;
    --accent2: #8b5cf6;
    --text: #e8e8f5;
    --muted: #6b6b8a;
    --danger: #ef4444;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100%; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* HEADER */
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px 9px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo-icon { font-size: 20px; }
  .logo-text {
    font-size: 16px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .live-dot { width: 7px; height: 7px; background: var(--danger); border-radius: 50%; animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  #count-badge { margin-left: auto; font-size: 12px; color: var(--muted); background: var(--card); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); }

  /* HOW IT WORKS BANNER */
  #how-banner {
    background: linear-gradient(90deg, rgba(44,165,224,.12), rgba(139,92,246,.12));
    border-bottom: 1px solid rgba(44,165,224,.2);
    padding: 9px 16px;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #how-banner span { color: var(--accent); font-weight: 600; }

  /* NOW PLAYING CARD */
  #now-card {
    display: none;
    flex-direction: column;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  /* Video thumbnail area */
  #thumb-area {
    height: 160px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  #thumb-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0a20, #1a0a30);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }

  .thumb-icon { font-size: 52px; opacity: .25; }

  #watch-btn {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #watch-btn-inner {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    padding: 13px 32px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(44,165,224,.35);
    transition: transform .12s, box-shadow .12s;
    -webkit-tap-highlight-color: transparent;
  }

  #watch-btn-inner:active { transform: scale(.96); box-shadow: 0 2px 10px rgba(44,165,224,.2); }

  .btn-play-icon { font-size: 18px; }
  .btn-label { font-size: 15px; }

  #watch-hint {
    font-size: 11px;
    color: rgba(255,255,255,.35);
    text-align: center;
  }

  /* Now playing info */
  #now-info {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #now-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  #now-text { flex: 1; min-width: 0; }
  #now-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  #now-meta { font-size: 11px; color: var(--muted); }

  #now-share-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
  }

  /* PLAYLIST */
  #list-section { flex: 1; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; padding: 10px 12px 20px; }
  #list-section::-webkit-scrollbar { display: none; }
  .sec-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; padding: 0 4px 8px; }

  .vcard {
    display: flex; gap: 10px; padding: 9px 10px;
    border-radius: 12px; cursor: pointer;
    transition: background .1s, transform .1s;
    border: 1px solid transparent;
    margin-bottom: 6px; align-items: center;
  }
  .vcard:active { transform: scale(.98); }
  .vcard:hover  { background: var(--card); border-color: var(--border); }
  .vcard.active {
    background: linear-gradient(135deg,rgba(44,165,224,.13),rgba(139,92,246,.13));
    border-color: var(--accent);
  }

  .vthumb {
    width: 70px; height: 46px;
    background: var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; position: relative; overflow: hidden;
  }
  .vthumb-ov {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; opacity: 0; transition: opacity .12s;
  }
  .vcard.active .vthumb-ov, .vcard:hover .vthumb-ov { opacity: 1; }
  .vcard.active .vthumb { border: 1px solid var(--accent); }

  .vinfo { flex: 1; min-width: 0; }
  .vtitle { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); margin-bottom: 3px; }
  .vcard.active .vtitle { color: var(--accent); }
  .vmeta { display: flex; gap: 6px; font-size: 11px; color: var(--muted); align-items: center; flex-wrap: wrap; }
  .vbadge { background: var(--border); padding: 1px 5px; border-radius: 4px; font-size: 10px; }
  .vcard.active .vbadge { background: rgba(44,165,224,.2); color: var(--accent); }

  /* STATES */
  #empty-state {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; padding: 50px 20px;
    text-align: center; color: var(--muted); gap: 12px;
  }
  .empty-icon { font-size: 44px; opacity: .3; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  #loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 50px 20px; gap: 14px; color: var(--muted);
  }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #fff;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo-icon">📺</span>
    <span class="logo-text">Telegram TV</span>
    <div class="live-dot"></div>
    <div id="count-badge">Loading…</div>
  </header>

  <div id="how-banner">
    📌 Tap a video → click <span>▶ Watch Now</span> → video sent to you in Telegram
  </div>

  <!-- NOW PLAYING CARD -->
  <div id="now-card">
    <div id="thumb-area">
      <div id="thumb-bg">
        <div class="thumb-icon">🎬</div>
      </div>
      <div id="watch-btn">
        <button id="watch-btn-inner" onclick="openInTelegram()">
          <span class="btn-play-icon">▶</span>
          <span class="btn-label">Watch Now</span>
        </button>
        <div id="watch-hint">Opens video directly in this chat</div>
      </div>
    </div>
    <div id="now-info">
      <div id="now-avatar">?</div>
      <div id="now-text">
        <div id="now-title">—</div>
        <div id="now-meta">Select a video to watch</div>
      </div>
      <a id="now-share-btn" href="#" onclick="shareVideo(event)">🔗 Share</a>
    </div>
  </div>

  <!-- LIST -->
  <div id="list-section">
    <div id="loading-state"><div class="spinner"></div><span>Loading videos…</span></div>
    <div id="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No videos yet.<br>Upload a video via the bot!</div></div>
    <div class="sec-label" id="sec-label" style="display:none">📋 All Videos</div>
    <div id="playlist"></div>
  </div>

</div>

<div id="toast">✅ Link copied!</div>

<script>
// ── Telegram WebApp ──
let tgApp = null;
try {
  if (window.Telegram && Telegram.WebApp) {
    tgApp = Telegram.WebApp;
    tgApp.ready();
    tgApp.expand();
  }
} catch(e) {}

let videos = [];
let curIdx = -1;
let curLink = "";

// ══════════════════════════════
//  LOAD DATA from ?data= param
// ══════════════════════════════
function init() {
  const p = new URLSearchParams(location.search);
  const b64 = p.get("data");

  if (!b64) {
    showEmpty("No video data. Re-run /generate_player_url in your bot.");
    return;
  }

  try {
    const json = JSON.parse(atob(b64));
    videos = json.videos || [];
  } catch(e) {
    showEmpty("Failed to parse video data. Re-run /generate_player_url.");
    return;
  }

  document.getElementById("loading-state").style.display = "none";
  document.getElementById("count-badge").textContent = videos.length + " video" + (videos.length !== 1 ? "s" : "");

  if (videos.length === 0) { showEmpty("No videos yet. Upload a video via the bot!"); return; }

  document.getElementById("sec-label").style.display = "block";
  renderPlaylist();
  selectVideo(0); // auto-select first
}

// ══════════════════════════════
//  RENDER PLAYLIST
// ══════════════════════════════
function renderPlaylist() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";

  videos.forEach((v, i) => {
    const title   = v.caption || ("Video #" + (i + 1));
    const who     = v.first_name || "Unknown";
    const initial = who.charAt(0).toUpperCase();
    const views   = v.downloads || 0;

    const d = document.createElement("div");
    d.className = "vcard";
    d.id = "c" + i;
    d.onclick = () => selectVideo(i);
    d.innerHTML = `
      <div class="vthumb">🎬<div class="vthumb-ov">▶</div></div>
      <div class="vinfo">
        <div class="vtitle">${esc(title)}</div>
        <div class="vmeta">
          <span>${esc(initial + ". " + who.split(" ")[0])}</span>
          <span class="vbadge">video</span>
          <span>↓ ${views}</span>
        </div>
      </div>`;
    list.appendChild(d);
  });
}

// ══════════════════════════════
//  SELECT VIDEO (highlight only, don't auto-open)
// ══════════════════════════════
function selectVideo(idx) {
  if (idx < 0 || idx >= videos.length) return;
  curIdx = idx;
  const v = videos[idx];

  // Update active card
  document.querySelectorAll(".vcard").forEach((c, i) => c.classList.toggle("active", i === idx));
  const ac = document.getElementById("c" + idx);
  if (ac) ac.scrollIntoView({ block: "nearest", behavior: "smooth" });

  const title   = v.caption || ("Video #" + (idx + 1));
  const who     = v.first_name || "Unknown";
  const initial = who.charAt(0).toUpperCase();
  const views   = v.downloads || 0;
  curLink       = v.link || "#";

  // Show now-card
  document.getElementById("now-card").style.display = "flex";
  document.getElementById("now-title").textContent  = title;
  document.getElementById("now-meta").textContent   = who + " · " + views + " views";
  document.getElementById("now-avatar").textContent = initial;
  document.getElementById("now-share-btn").href     = curLink;
}

// ══════════════════════════════
//  OPEN IN TELEGRAM
//  Uses Telegram WebApp openLink to open bot deep link
//  This triggers /start?file_key which makes bot send the video
// ══════════════════════════════
function openInTelegram() {
  if (!curLink || curLink === "#") return;

  if (tgApp) {
    // Use Telegram WebApp native method — keeps user in Telegram
    try {
      // openTelegramLink opens a t.me link natively inside Telegram
      tgApp.openTelegramLink(curLink);
      return;
    } catch(e) {}

    // Fallback: openLink
    try {
      tgApp.openLink(curLink);
      return;
    } catch(e) {}
  }

  // Last fallback: open in new tab
  window.open(curLink, "_blank");
}

// ══════════════════════════════
//  SHARE VIDEO
// ══════════════════════════════
function shareVideo(e) {
  e.preventDefault();
  if (!curLink || curLink === "#") return;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(curLink).then(() => showToast("✅ Link copied!"));
  } else {
    // Fallback copy
    const ta = document.createElement("textarea");
    ta.value = curLink;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("✅ Link copied!");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function showEmpty(msg) {
  document.getElementById("loading-state").style.display = "none";
  document.getElementById("empty-state").style.display   = "flex";
  document.getElementById("empty-state").querySelector(".empty-text").textContent = msg;
  document.getElementById("count-badge").textContent = "0 videos";
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
